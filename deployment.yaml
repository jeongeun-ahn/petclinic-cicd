apiVersion: apps/v1
kind: Deployment
metadata: 
  name: user18-petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
      - name: petclinic
        image: 450444046629.dkr.ecr.ap-southeast-2.amazonaws.com/user18-petclinic:v1
        ports:
        - containerPort: 8080

